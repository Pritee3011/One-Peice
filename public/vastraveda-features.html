<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VastraVeda – Textile Heritage Set</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void: #080B12;
      --deep: #0D1117;
      --surface: #161B27;
      --card: #1C2333;
      --border: #2A3142;
      --dim: #8892A4;
      --text: #C9D1E0;
      --bright: #E8EDF5;
      --accent: #8B5CF6; /* Purple accent for Textiles */
      --accent-glow: #A78BFA;
      --emerald: #10B981;
      --amber: #F59E0B;
      --rose: #F43F5E;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--void);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--deep); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }

    header { text-align: center; padding: 72px 0 56px; position: relative; }
    header::after {
      content: '';
      display: block;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.4), transparent);
      margin-top: 48px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--dim);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 8px;
      margin-bottom: 32px;
      transition: all 0.2s;
    }
    .back-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(139, 92, 246, 0.05); }

    .tag {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      padding: 4px 12px;
      border-radius: 999px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 800; color: var(--bright); line-height: 1.1; margin-bottom: 12px; }
    h1 span {
      background: linear-gradient(135deg, #A78BFA, #8B5CF6, #6366F1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle { color: var(--dim); font-size: 1rem; max-width: 520px; margin: 0 auto; line-height: 1.6; }

    .stats { display: flex; justify-content: center; gap: 40px; margin: 40px 0 0; flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat-value { font-weight: 700; font-size: 1.5rem; color: var(--bright); }
    .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }

    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
    .filter-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 7px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(139, 92, 246, 0.08); }
    .filter-btn.active { background: var(--accent); color: white; box-shadow: 0 0 12px rgba(139, 92, 246, 0.3); }

    .section-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 20px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background-image: linear-gradient(135deg, rgba(139, 92, 246, 0.03) 0%, transparent 60%);
    }
    .card:hover { border-color: rgba(139, 92, 246, 0.4); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .feature-number {
      font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent);
      background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.2);
      width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700;
    }

    .difficulty-badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 4px 10px; border-radius: 999px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
    .difficulty-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
    .diff-easy { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); color: var(--emerald); }
    .diff-easy::before { background: var(--emerald); }
    .diff-medium { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25); color: var(--amber); }
    .diff-medium::before { background: var(--amber); }

    .card h3 { font-size: 1rem; font-weight: 700; color: var(--bright); line-height: 1.3; }
    .card p { font-size: 0.85rem; color: var(--dim); line-height: 1.6; flex: 1; }
    .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.2), transparent); }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .card-type { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--dim); text-transform: uppercase; }
    .arrow-btn { width: 28px; height: 28px; border-radius: 8px; background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.2); display: flex; align-items: center; justify-content: center; color: var(--accent); transition: all 0.2s; }
    .card:hover .arrow-btn { background: var(--accent); color: white; border-color: var(--accent); }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(8,11,18,0.85); backdrop-filter: blur(12px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 560px; max-height: 88vh; overflow: hidden; display: flex; flex-direction: column; transform: translateY(20px); transition: transform 0.3s; }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header { padding: 24px 24px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; }
    .close-btn { background: transparent; border: 1px solid var(--border); color: var(--dim); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .close-btn:hover { color: var(--bright); border-color: var(--accent); }
    .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
    .meta-chip { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 5px 12px; border-radius: 8px; border: 1px solid var(--border); color: var(--dim); background: var(--deep); margin: 0 8px 8px 0; display: inline-block; }

    .hidden { display: none; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .card-item { animation: fadeUp 0.5s ease forwards; }
  </style>
</head>
<body>

<div class="wrapper">
  <header>
    <a href="/" target="_top" class="back-btn">&#8592; Back to CommitVerse</a>
    <div class="tag">&#10022; Textile Feature Set</div>
    <h1>Vastra<span>Veda</span></h1>
    <p class="subtitle">Documenting India's Traditional Clothing & Textile Heritage — 15 handloom and embroidery challenges.</p>
    <div class="stats">
      <div class="stat"><div class="stat-value">15</div><div class="stat-label">Features</div></div>
      <div class="stat"><div class="stat-value">7</div><div class="stat-label">Easy</div></div>
      <div class="stat"><div class="stat-value">7</div><div class="stat-label">Medium</div></div>
      <div class="stat"><div class="stat-value">1</div><div class="stat-label">Hard</div></div>
    </div>
  </header>

  <div class="filters">
    <button class="filter-btn active" onclick="filterCards('all', this)">All 15</button>
    <button class="filter-btn" onclick="filterCards('easy', this)">Easy 7</button>
    <button class="filter-btn" onclick="filterCards('medium', this)">Medium 7</button>
     <button class="filter-btn" onclick="filterCards('hard', this)">Hard 1</button>
  </div>

  <p class="section-label">// select a textile mission to begin</p>

  <div class="grid" id="featureGrid">
    </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2 id="modalTitle" style="color:var(--bright)"></h2>
        <p id="modalMeta" style="font-family:'JetBrains Mono'; font-size:11px; color:var(--dim); margin-top:4px;"></p>
      </div>
      <button class="close-btn" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="modal-body">
      <div id="modalChips" style="margin-bottom:16px;"></div>
      <p id="modalDesc" style="font-size:0.9rem; line-height:1.7; color:var(--text)"></p>
    </div>
  </div>
</div>

<script>
  const features = [
    {
      title: "Regional Directory",
      diff: "easy", type: "Directory",
      chips: ["Pagination", "Region Filter", "Community", "Fabric"],
      desc: "Display a structured list of clothing categorized by region, community, and fabric type. Implement filtering and pagination to handle a large dataset of traditional garments."
    },
    {
      title: "Interactive Clothing Map",
      diff: "medium", type: "Interactive",
      chips: ["SVG Map", "State Click", "Region View"],
      desc: "Allow users to click on different regions or states of India on an interactive map and view traditional clothing specific to that region in a popup or side panel."
    },
    {
      title: "Fabric Origins Tracker",
      diff: "medium", type: "Tracker",
      chips: ["Origins", "Timeline", "Geographic Spread"],
      desc: "Show how specific fabrics (like Khadi or Silk) originated and spread across different Indian regions using a simple timeline or a connected list view."
    },
    {
      title: "Festival Calendar",
      diff: "easy", type: "Calendar",
      chips: ["Seasonal", "Festivals", "Traditional Wear"],
      desc: "Display a seasonal calendar showing which Indian festivals happen throughout the year, and what specific traditional clothing is traditionally worn during each."
    },
    {
      title: "Occasion Guide",
      diff: "easy", type: "Guide",
      chips: ["Wedding", "Religious", "Formal", "Dance"],
      desc: "Build a UI with clickable occasion buttons. Clicking 'Wedding' or 'Dance' filters DataStore items by that occasion and renders specific result cards."
    },
    {
      title: "Clothing Quiz",
      diff: "medium", type: "Interactive",
      chips: ["Multiple Choice", "DataStore", "Knowledge Test"],
      desc: "An interactive multiple-choice quiz that tests the user's knowledge about Indian traditional clothing styles, drapes, and histories using DataStore facts."
    },
    {
      title: "Historical Timeline",
      diff: "medium", type: "Timeline",
      chips: ["Vedic Era", "Mughal Era", "Colonial", "Modern"],
      desc: "Display a vertical scrollable timeline showing the evolution of Indian clothing from the Vedic period to modern day, linking specific garments to their eras."
    },
    {
      title: "Compare Outfits",
      diff: "hard", type: "Utility",
      chips: ["Side-by-Side", "Attribute Comparison", "Care Diff"],
      desc: "Allow users to select two clothing items side-by-side to compare attributes like fabric, region, occasion, era, and specific maintenance requirements."
    },
    {
      title: "Visual Gallery",
      diff: "easy", type: "Gallery",
      chips: ["Large Cards", "Emoji Icons", "Quick Stats"],
      desc: "A visually rich gallery using large cards with emoji icons, name, and region tags. Clicking a card opens the full high-resolution detail view."
    },
    {
      title: "Cultural Stories",
      diff: "medium", type: "Content",
      chips: ["Legends", "Historical Tales", "Reading Pane"],
      desc: "Display the rich cultural stories and historical origin tales behind iconic garments. Features a story list on the left and a dedicated reading pane on the right."
    },
    {
      title: "Care & Maintenance",
      diff: "easy", type: "Guide",
      chips: ["Fabric Care", "Symbols", "Storage Tips"],
      desc: "Teach users how to care for traditional garments. Grouped by fabric type (Silk, Cotton) with washing symbols, storage advice, and do's/don'ts."
    },
    {
      title: "Textile Glossary",
      diff: "easy", type: "Reference",
      chips: ["A–Z Dictionary", "Search", "Definitions"],
      desc: "An A–Z dictionary of Indian textile and clothing terms. Users can browse alphabetically, search by keyword, or click a term to see its full definition."
    },
    {
      title: "Featured Artisans",
      diff: "easy", type: "Profiles",
      chips: ["Master Weavers", "Craft Specialty", "Region"],
      desc: "Spotlight the master weavers and artisans keeping traditions alive. Profile cards include the artisan's specific craft, their region, and known garments."
    },
    {
      title: "State Profiles",
      diff: "medium", type: "Database",
      chips: ["Textile Identity", "GI-Tags", "Signature Colors"],
      desc: "A detailed profile page for each Indian state showing its textile identity: signature garments, dominant fabrics, and GI-tagged heritage items."
    },
    {
      title: "Modern Trends",
      diff: "medium", type: "Trends",
      chips: ["Fusion", "Global Runway", "Traditional vs Modern"],
      desc: "Showcase how traditional clothing influenced contemporary fashion. Features 'traditional vs modern' comparisons and fusion trend cards."
    }
  ];

  const grid = document.getElementById('featureGrid');
  
  function renderCards(data) {
    grid.innerHTML = data.map((f, i) => `
      <div class="card-item" data-diff="${f.diff}" onclick="openModal(${i})">
        <div class="card">
          <div class="card-top">
            <div class="feature-number">${(i+1).toString().padStart(2, '0')}</div>
            <span class="difficulty-badge diff-${f.diff}">${f.diff.charAt(0).toUpperCase() + f.diff.slice(1)}</span>
          </div>
          <h3>${f.title}</h3>
          <p>${f.desc.substring(0, 100)}...</p>
          <div class="divider"></div>
          <div class="card-footer">
            <span class="card-type">${f.type}</span>
            <div class="arrow-btn">&#8594;</div>
          </div>
        </div>
      </div>
    `).join('');
  }

  function openModal(i) {
    const f = features[i];
    document.getElementById('modalTitle').textContent = f.title;
    document.getElementById('modalMeta').textContent = f.type + ' · Difficulty: ' + f.diff;
    document.getElementById('modalDesc').textContent = f.desc;
    document.getElementById('modalChips').innerHTML = f.chips.map(c => `<span class="meta-chip">${c}</span>`).join('');
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow = ''; }
  function closeModalOnBg(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }
  function filterCards(diff, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.card-item').forEach(card => {
      card.classList.toggle('hidden', diff !== 'all' && card.dataset.diff !== diff);
    });
  }

  renderCards(features);
</script>
</body>
</html>
